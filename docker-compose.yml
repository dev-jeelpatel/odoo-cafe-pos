version: '3.9'

services:
  postgres:
    image: postgres:17-alpine
    container_name: cafe_pos_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: restaurant_pos
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cafe_pos_backend
    restart: unless-stopped
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/restaurant_pos
      JWT_SECRET: cafe-pos-super-secret-jwt-key-2024
      JWT_REFRESH_SECRET: cafe-pos-refresh-secret-key-2024
      CLIENT_URL: http://localhost:3000
    ports:
      - '5000:5000'
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node dist/index.js"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cafe_pos_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  postgres_data:
